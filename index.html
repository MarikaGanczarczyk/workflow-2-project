<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Website</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="left-nav">
        <a href="index.html"> 🏨 Hotels</a>
        <a href="Profile.html">✈️ Flight</a>
        <a href="MeetTheTeam.html">🚗 Cars</a>
        <a href="SDLC.html">✈️ | 🏨 Hotels & Flights</a>
      </nav>

      <div class="right-nav">
        <button class="user-btn">
          <svg class="user-icon" viewBox="0 0 24 24">
            <path
              d="M12 12c2.7 0 4.8-2.2 4.8-4.8S14.7 2.4 12 2.4 7.2 4.6 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
            />
          </svg>
        </button>
      </div>
    </header>

    <section class="search-section">
      <h1 class="search-title">Find your perfect place!</h1>
     

      <section class="search-card" aria-label="Search">
        <!-- Destination -->
        <label class="field">
          <span class="field-label">Destination 📍</span>
          <span class="field-input">
            <input
              type="text"
              placeholder="Where are you going?"
              aria-label="Destination"
            />
          </span>
        </label>

        <!-- Check-in -->
        <label class="field">
          <span class="field-label">Check‑in 📅</span>
          <span class="field-input">
            <input type="date" aria-label="Check-in date" />
          </span>
        </label>

        <!-- Check-out -->
        <label class="field">
          <span class="field-label">Check‑out 📅</span>
          <span class="field-input">
            <input type="date" aria-label="Check-out date" />
          </span>
        </label>

        <!-- Guests  -->
        <label class="field">
          <span class="field-label">Guests 👤</span>
          <span class="field-input">
            <select aria-label="Guests">
              <option>1 adult</option>
              <option>2 adults</option>
              <option>3 adults</option>
              <option>4 adults</option>
              <option>Family (2 adults, 1 child)</option>
              <option>Family (2 adults, 2+ children)</option>
            </select>
          </span>
        </label>

  <!-- //Search button // -->
        <button class="search-btn" aria-label="Search">Search</button>
      </section>
    </section>

    <section class="explore-section">
      <h1 class="explore-title">More offers</h1>
      
    </section>
  </body>
</html>
